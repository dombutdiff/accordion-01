<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Services Accordion</title>
    <style>
        /* --- CSS Reset --- */

        @import url('https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap');


        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #fff;
            padding: 50px;
            display: flex;
            justify-content: center;
        }

        /* --- Main Container (Column Flex Direction) --- */
        .services-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 800px;
        }

        .services-label {
            font-size: 14px;
            color: #666;
            margin-bottom: 40px;
        }

        .services-title {
            font-size: 16px;
            margin-bottom: 30px;
            font-weight: 400;
        }

        /* --- Accordion Item & The "Line Between" --- */
        .accordion-item {
            border-bottom: 1px solid #e0e0e0;
            overflow: hidden;
        }

        /* Remove border from last item just like the image */
        /* .accordion-item:last-child {
            border-bottom: none;
        } */

        /* --- Button/Header (Space Between Title and Arrow) --- */
        .accordion-header {
            width: 100%;
            background: none;
            border: none;
            text-align: left;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 25px 0;
            outline: none;
        }

        /* Title text styling - slightly larger than content */
        .accordion-header h2 {
            font-size: 32px;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        /* --- Custom Arrow SVG with "Back-Pointing" logic --- */
        .icon {
            width: 32px;
            height: 32px;
            transition: transform 0.3s ease-in-out;
            transform: rotate(0deg); /* State: Closed (Pointing Down) */
        }

        /* --- Content Area - Set up for Height Animation --- */
        .accordion-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out; /* Uses height for smooth dropdown */
        }

        /* --- Inner Content Styling (Padding/List style) --- */
        .accordion-body {
            list-style: none;
            padding-bottom: 25px; /* Spacing below last item when open */
        }

        .accordion-body li {
            font-size: 20px;
            margin-bottom: 15px;
            line-height: 1.4;
            color: #333;
            transform: translateY(10px);
            opacity: 0;
            /* Delay the text fade-in until the container has started moving */
            transition: all 0.4s ease;
         
        }

        /* Keep last item clean */
        .accordion-body li:last-child {
            margin-bottom: 0;
        }

        /* --- ACTIVE STATE RULES --- */

        /* Rule to open the content */
        .accordion-item.active .accordion-content {
            max-height: 500px; /* Arbitrary high value for height transition to 'auto' */
            opacity: 1;
            pointer-events: all;
        }

        /* Rule to flip arrow UP when active */
        .accordion-item.active .icon {
            transform: rotate(180deg);
        }

        .accordion-item.active .accordion-body li {
            transform: translateY(0);
            opacity: 1;
        }

        /* Staggered delay for each list item for the "Fade" effect */
        .accordion-item.active .accordion-body li:nth-child(1) { transition-delay: 0.1s; }
        .accordion-item.active .accordion-body li:nth-child(2) { transition-delay: 0.2s; }
        .accordion-item.active .accordion-body li:nth-child(3) { transition-delay: 0.3s; }
        .accordion-item.active .accordion-body li:nth-child(4) { transition-delay: 0.4s; }

    </style>
</head>
<body>

    <div class="services-container">
        <h1 class="services-title">Services</h1>

        <div class="accordion-item">
            <button class="accordion-header" aria-expanded="false">
                <h2>Branding</h2>
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <polyline points="19 12 12 19 5 12"></polyline>
                </svg>
            </button>
            <div class="accordion-content">
                <ul class="accordion-body">
                    <li>Logo Design</li>
                    <li>Brand Guidelines</li>
                    <li>Collateral Design</li>
                    <li>Rebranding Services</li>
                </ul>
            </div>
        </div>

        <div class="accordion-item">
            <button class="accordion-header" aria-expanded="false">
                <h2>Motion & Animation</h2>
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <polyline points="19 12 12 19 5 12"></polyline>
                </svg>
            </button>
            <div class="accordion-content">
                <ul class="accordion-body">
                    <li>Motion Graphics Design</li>
                    <li>Animated Explainer Videos</li>
                    <li>Interactive Presentations</li>
                </ul>
            </div>
        </div>

        <div class="accordion-item">
            <button class="accordion-header" aria-expanded="false">
                <h2>Mobile</h2>
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <polyline points="19 12 12 19 5 12"></polyline>
                </svg>
            </button>
            <div class="accordion-content">
                <ul class="accordion-body">
                    <li>iOS App Development</li>
                    <li>Android App Development</li>
                    <li>App Prototyping and Testing</li>
                    <li>App Maintenance and Updates</li>
                </ul>
            </div>
        </div>

    </div>

    <script>
        document.querySelectorAll('.accordion-header').forEach(header => {
            header.addEventListener('click', () => {
                const accordionItem = header.parentElement;
                const accordionContent = accordionItem.querySelector('.accordion-content');
                const isItemActive = accordionItem.classList.contains('active');

                // 1. (Optional) Close all other open items for a true single-select accordion
                document.querySelectorAll('.accordion-item.active').forEach(activeItem => {
                    if (activeItem !== accordionItem) {
                        activeItem.classList.remove('active');
                        activeItem.querySelector('.accordion-content').style.maxHeight = 0;
                        activeItem.querySelector('.accordion-header').setAttribute('aria-expanded', 'false');
                    }
                });

                // 2. Toggle active class for arrow flip and visibility state
                accordionItem.classList.toggle('active');

                // 3. Handle smooth height animation
                if (accordionItem.classList.contains('active')) {
                    accordionContent.style.maxHeight = accordionContent.scrollHeight + "px"; // Dynamically set height
                    header.setAttribute('aria-expanded', 'true');
                } else {
                    accordionContent.style.maxHeight = 0; // Collapse
                    header.setAttribute('aria-expanded', 'false');
                }
            });
        });
    </script>

</body>
</html>
